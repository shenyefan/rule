# 工作流名称
name: Sync Rules

on:
  # 允许手动触发
  workflow_dispatch:
  # 定时触发
  schedule:
    - cron: '0 3 * * *'

jobs:
  sync-rules:
    runs-on: ubuntu-latest

    steps:
    # 下载仓库代码
    - name: Checkout current repo
      uses: actions/checkout@v4
      with:
        # 获取历史记录
        fetch-depth: 0

    # 安装依赖
    - name: Install diff tools
      run: |
        sudo apt-get update
        sudo apt-get install -y diffutils bc

    # 创建目录
    - name: Create necessary directories
      run: |
        mkdir -p Rules/AI
        mkdir -p Rules/Microsoft
        mkdir -p Rules/Apple
        mkdir -p Rules/PayPal
        mkdir -p Rules/Telegram
        mkdir -p Rules/Twitter
        mkdir -p Rules/Media
        mkdir -p Rules/Game
        mkdir -p Rules/Google
        mkdir -p Rules/Ads

    # 处理规则
    - name: Download and check files
      id: download-and-compare
      run: |
        # 初始化更新标志
        HAS_UPDATE=0
        UPDATED_FILES=""
        # 获取当前时间
        CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

        # 处理AI规则
        # AI_SOURCES=(
        #   "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list"
        #   "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.list"
        #   "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list"
        #   "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.list"
        # )
        # AI_LOCAL_PATH="Rules/AI/AI.list"
        # TEMP_AI_RAW="temp_ai_raw.list"
        # TEMP_AI_FINAL="temp_ai_final.list"

        # echo "正在下载并合并 AI 规则..."
        # > "$TEMP_AI_RAW"
        # for url in "${AI_SOURCES[@]}"; do
        #   curl -sL "$url" >> "$TEMP_AI_RAW"
        # done

        # # 清理合并后的文件
        # {
        #   echo "# NAME: AI (Aggregated)"
        #   echo "# REPO: https://github.com/${{ github.repository }}"
        #   echo "# UPDATED: $CURRENT_TIME"
        #   grep -vE '^#|^$' "$TEMP_AI_RAW" | sort -u
        # } > "$TEMP_AI_FINAL"

        # if [ ! -f "$AI_LOCAL_PATH" ]; then
        #   echo "$AI_LOCAL_PATH 下载中..."
        #   cp "$TEMP_AI_FINAL" "$AI_LOCAL_PATH"
        #   HAS_UPDATE=1
        # else
        #   diff -u "$AI_LOCAL_PATH" "$TEMP_AI_FINAL" > temp_diff.txt || true
        #   DIFF_LINES=$(grep -E "^[+-]" temp_diff.txt | grep -vE "^(---|\+\+\+)" | wc -l)
        #   TOTAL_LINES=$(wc -l < "$TEMP_AI_FINAL")
        #   if [ $TOTAL_LINES -eq 0 ]; then TOTAL_LINES=1; fi
        #   DIFF_PERCENT=$(awk "BEGIN {printf \"%.2f\", ($DIFF_LINES/$TOTAL_LINES)*100}")
        #   echo "$AI_LOCAL_PATH 差异比例: $DIFF_PERCENT%"

        #   if (( $(echo "$DIFF_PERCENT > 50" | bc -l) )); then
        #     echo "❌ $AI_LOCAL_PATH 差异过大需要手动处理"
        #     echo "----- BEGIN FETCHED AI RAW -----"
        #     cat "$TEMP_AI_RAW"
        #     echo "----- END FETCHED AI RAW -----"
        #     exit 1
        #   fi
        #   if (( $(echo "$DIFF_PERCENT > 0" | bc -l) )); then
        #     echo "⚙️ $AI_LOCAL_PATH 已更新"
        #     cp "$TEMP_AI_FINAL" "$AI_LOCAL_PATH"
        #     HAS_UPDATE=1
        #   else
        #     echo "✅ $AI_LOCAL_PATH 无需更新"
        #   fi
        # fi


        # 处理规则
        declare -A file_map
        file_map["Rules/Apple/Apple.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.list"
        file_map["Rules/Microsoft/Microsoft.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.list"
        file_map["Rules/PayPal/PayPal.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PayPal/PayPal.list"
        file_map["Rules/Telegram/Telegram.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list"
        file_map["Rules/Twitter/Twitter.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.list"
        file_map["Rules/Media/AppleTV.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AppleTV/AppleTV.list"
        file_map["Rules/Media/YouTube.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list"
        file_map["Rules/Media/Netflix.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list"
        file_map["Rules/Media/Disney.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list"
        file_map["Rules/Media/Bahamut.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Bahamut/Bahamut.list"
        file_map["Rules/Media/Bilibili.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BiliBili/BiliBili.list"
        file_map["Rules/Google/Google.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list"
        file_map["Rules/Game/Game.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Game/Game.list"
        file_map["Rules/Game/SteamCN.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.list"
        file_map["Rules/Ads/Advertising.list"]="https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising.list"

        for local_path in "${!file_map[@]}"; do
          url="${file_map[$local_path]}"
          temp_raw_file="temp_download_raw.list"
          temp_processed_file="temp_download_processed.list"

          echo "Processing $local_path ..."
          curl -sL "$url" -o "$temp_raw_file"

          ORIGINAL_NAME=$(grep '^# NAME:' "$temp_raw_file" | sed 's/# NAME: //')
          {
            echo "# NAME: $ORIGINAL_NAME"
            echo "# REPO: https://github.com/${{ github.repository }}"
            echo "# UPDATED: $CURRENT_TIME"
            grep -vE '^#|^$' "$temp_raw_file"
          } > "$temp_processed_file"

          if [ ! -f "$local_path" ]; then
            echo "$local_path does not exist, downloading new file."
            cp "$temp_processed_file" "$local_path"
            HAS_UPDATE=1
            UPDATED_FILES="$UPDATED_FILES $local_path"
            continue
          fi

          diff -u "$local_path" "$temp_processed_file" > temp_diff.txt || true
          DIFF_LINES=$(grep -E "^[+-]" temp_diff.txt | grep -vE "^(---|\+\+\+)" | wc -l)
          TOTAL_LINES=$(wc -l < "$temp_processed_file")
          if [ $TOTAL_LINES -eq 0 ]; then TOTAL_LINES=1; fi
          DIFF_PERCENT=$(awk "BEGIN {printf \"%.2f\", ($DIFF_LINES/$TOTAL_LINES)*100}")
          echo "$local_path difference ratio: $DIFF_PERCENT%"

          if (( $(echo "$DIFF_PERCENT > 50" | bc -l) )); then
            echo "❌ $local_path has excessive differences, manual handling required"
            echo "----- BEGIN FETCHED RAW -----"
            cat "$temp_raw_file"
            echo "----- END FETCHED RAW -----"
            exit 1
          fi
          if (( $(echo "$DIFF_PERCENT > 0" | bc -l) )); then
            echo "⚙️ $local_path has been updated"
            cp "$temp_processed_file" "$local_path"
            HAS_UPDATE=1
            UPDATED_FILES="$UPDATED_FILES $local_path"
          else
            echo "✅ $local_path no update needed"
          fi
        done

        echo "has_update=$HAS_UPDATE" >> $GITHUB_OUTPUT
        echo "updated_files=$UPDATED_FILES" >> $GITHUB_OUTPUT
        rm -f temp_*.list temp_diff.txt

    # 推送到仓库
    - name: Commit and push updates
      if: steps.download-and-compare.outputs.has_update == '1'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Rules/
        git commit -m "chore(rules): Automatically sync and format updated rule files: ${{ steps.download-and-compare.outputs.updated_files }}"
        git push
